<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- brutalist square base -->
  <rect width="64" height="64" fill="#0a0a0a"/>

  <!-- 2px orange brutalist border -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#f5901c" stroke-width="2"/>

  <!-- SW wordmark -->
  <text x="32" y="44"
        text-anchor="middle"
        font-family="'Space Grotesk', 'Inter', 'Segoe UI', system-ui, -apple-system, Arial Black, sans-serif"
        font-weight="800"
        font-size="34"
        letter-spacing="-1.5"
        fill="#f5f5f5">SW</text>

  <!-- bottom-left orange accent bar - the brutalist anchor -->
  <rect x="6" y="54" width="14" height="3" fill="#f5901c"/>
</svg>
